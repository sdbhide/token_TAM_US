<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#f5f7fa" />
<meta name="color-scheme" content="light" />
<title>US AI Token Demand: TAM Explorer</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{
    --ink:#f5f7fa;        /* page background, soft off-white */
    --panel:#ffffff;      /* card surface */
    --panel-2:#eef1f5;    /* secondary surface (tracks, segments) */
    --line:#d4dbe3;       /* hairlines */
    --mute:#5a6b7b;       /* muted labels */
    --text:#16212e;       /* body text, dark slate */
    --consumer:#2f6f9f;   /* segment blue */
    --enterprise:#b06f23; /* segment amber/ochre */
    --accent:#0f766e;     /* convergence teal */
    --warn:#b3372c;       /* heavy-tail red */
    --grid:#e2e7ee;
    --on-accent:#ffffff;  /* text on accent fill */
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--ink);color:var(--text);
    font-family:"IBM Plex Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased}
  .mono{font-family:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,monospace;
    font-variant-numeric:tabular-nums}
  a{color:var(--accent)}
  .wrap{max-width:1180px;margin:0 auto;padding:32px 22px 64px}
  header{border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:24px}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--mute);margin:0 0 8px}
  h1{font-size:30px;line-height:1.1;margin:0;font-weight:650;letter-spacing:-.01em}
  h1 .em{color:var(--accent)}
  .sub{color:var(--mute);max-width:64ch;margin:12px 0 0;font-size:14.5px;line-height:1.5}
  .controls-head{display:flex;align-items:center;justify-content:space-between;
    gap:12px;margin:24px 0 12px;flex-wrap:wrap}
  .controls-head .ttl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mute)}
  .help-btn{background:var(--panel);border:1px solid var(--line);color:var(--text);
    border-radius:7px;padding:8px 14px;font-size:12.5px;cursor:pointer;font-family:inherit;
    transition:.12s;display:inline-flex;align-items:center;gap:7px}
  .help-btn:hover{border-color:var(--accent);color:var(--accent)}
  .help-btn .ic{display:inline-flex;width:16px;height:16px;border-radius:50%;
    border:1px solid currentColor;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;flex:none}
  .explain{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;
    padding:14px 16px;margin:0 0 18px;display:grid;gap:10px}
  .explain .row{display:grid;grid-template-columns:170px 1fr;gap:14px;align-items:baseline}
  .explain .term{font-size:13px;font-weight:600;color:var(--text)}
  .explain .term .sw{display:inline-block;width:9px;height:9px;border-radius:2px;
    margin-right:7px;vertical-align:1px;background:var(--enterprise)}
  .explain .def{font-size:13px;color:var(--mute);line-height:1.45}
  .assume{display:grid;gap:11px;margin-top:2px}
  .assume .item{display:grid;grid-template-columns:210px 1fr;gap:14px;align-items:baseline}
  .assume .item.key{background:rgba(15,118,110,.06);border:1px solid var(--accent);
    border-radius:8px;padding:12px 14px;align-items:start}
  .assume .nm{font-size:13px;font-weight:600;color:var(--text)}
  .assume .item.key .nm{color:var(--accent)}
  .assume .dx{font-size:13px;color:var(--mute);line-height:1.45}
  .assume .pill{display:inline-block;font-size:9px;letter-spacing:.07em;text-transform:uppercase;
    background:var(--accent);color:var(--on-accent);border-radius:4px;padding:1px 6px;margin-left:8px;
    font-weight:700;vertical-align:2px}
  .glossary{margin-top:30px;padding-top:18px;border-top:1px solid var(--line)}
  .glossary h2{font-size:12px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--mute);margin:0 0 12px;font-weight:600}
  .controls{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:0 0 24px}
  .ctrl label{display:block;font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--mute);margin-bottom:7px}
  .seg{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;background:var(--panel)}
  .seg button{flex:1;background:transparent;border:0;color:var(--mute);
    padding:9px 6px;font-size:13px;cursor:pointer;font-family:inherit;transition:.12s}
  .seg button:hover{color:var(--text);background:var(--panel-2)}
  .seg button[aria-pressed="true"]{background:var(--accent);color:var(--on-accent);font-weight:600}
  .grid{display:grid;grid-template-columns:1.55fr 1fr;gap:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px;
    box-shadow:0 1px 2px rgba(16,33,46,.04)}
  .card h2{font-size:12px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--mute);margin:0 0 4px;font-weight:600}
  .card .note{font-size:12.5px;color:var(--mute);margin:0 0 14px;line-height:1.4}
  .statrow{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:6px}
  .stat .k{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute)}
  .stat .v{font-size:23px;font-weight:600;margin-top:3px}
  .stat .v small{font-size:13px;color:var(--mute);font-weight:400}
  .full{grid-column:1/-1}
  .legend{display:flex;gap:18px;flex-wrap:wrap;font-size:12.5px;color:var(--mute);margin-top:10px}
  .legend i{display:inline-block;width:11px;height:11px;border-radius:2px;margin-right:6px;
    vertical-align:-1px}
  .bar-row{display:flex;align-items:center;gap:10px;margin:9px 0}
  .bar-row .lab{width:78px;font-size:12.5px;color:var(--text);text-align:right;flex:none}
  .bar-track{flex:1;background:var(--panel-2);border-radius:4px;height:18px;position:relative;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px;transition:width .45s cubic-bezier(.4,0,.2,1)}
  .bar-row .pct{width:46px;font-size:12.5px;color:var(--mute);flex:none}
  .conv{display:flex;align-items:center;gap:14px;margin-top:8px}
  .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .conv .txt{font-size:13px;line-height:1.45}
  footer{margin-top:30px;padding-top:18px;border-top:1px solid var(--line);
    color:var(--mute);font-size:12.5px;line-height:1.6}
  .tag{display:inline-block;font-size:11px;border:1px solid var(--line);border-radius:5px;
    padding:2px 8px;color:var(--mute);margin-left:8px;vertical-align:2px}
  .err{padding:40px;text-align:center;color:var(--mute)}
  .links{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px}
  .links a{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--accent);
    text-decoration:none;border:1px solid var(--line);border-radius:7px;padding:7px 12px;
    transition:.12s}
  .links a:hover{border-color:var(--accent);background:var(--panel-2)}
  .links svg{flex:none}
  @media(max-width:860px){.grid{grid-template-columns:1fr}.controls{grid-template-columns:1fr}
    .statrow{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){
    .wrap{padding:24px 16px 48px}
    h1{font-size:24px}
    .explain .row{grid-template-columns:1fr;gap:3px}
    .assume .item{grid-template-columns:1fr;gap:4px}
    .statrow{grid-template-columns:1fr}
    .links a{flex:1 1 auto;justify-content:center}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useMemo} = React;
const fmt = (v,d=1)=> v==null? "n/a" : v.toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d});

// ---- TAM distribution chart (log x, mean/median/P5-P95) -----------------
function DistChart({hist, stats}){
  const W=640,H=300,padL=20,padR=16,padT=22,padB=34;
  if(!hist||!hist.length) return null;
  const xs=hist.map(d=>d.x), ys=hist.map(d=>d.y);
  const lx=xs.map(Math.log10);
  const xmin=Math.min(...lx), xmax=Math.max(...lx);
  const ymax=Math.max(...ys);
  const X=v=>padL+( (Math.log10(v)-xmin)/(xmax-xmin) )*(W-padL-padR);
  const Y=v=>padT+(1-v/ymax)*(H-padT-padB);
  const bw=(W-padL-padR)/hist.length*0.86;
  const ticks=[10,20,50,100,200,500].filter(t=>Math.log10(t)>=xmin+0.02 && Math.log10(t)<=xmax-0.02);
  const band=[stats.p5,stats.p95];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" role="img" aria-label="TAM distribution">
      <rect x={X(band[0])} y={padT} width={Math.max(X(band[1])-X(band[0]),0)} height={H-padT-padB}
            fill="#16212e" opacity="0.05"/>
      {hist.map((d,i)=>(
        <rect key={i} x={X(d.x)-bw/2} y={Y(d.y)} width={bw} height={Y(0)-Y(d.y)}
              fill="var(--enterprise)" opacity="0.72" rx="1"/>
      ))}
      {/* median + mean lines */}
      <line x1={X(stats.median)} x2={X(stats.median)} y1={padT} y2={H-padB}
            stroke="var(--text)" strokeWidth="1.6"/>
      <line x1={X(stats.mean)} x2={X(stats.mean)} y1={padT} y2={H-padB}
            stroke="var(--warn)" strokeWidth="1.6" strokeDasharray="5 3"/>
      <text x={X(stats.median)} y={padT-1} fill="var(--text)" fontSize="10.5"
            textAnchor="middle" className="mono">med ${fmt(stats.median,0)}B</text>
      <text x={X(stats.mean)} y={padT+13} fill="var(--warn)" fontSize="10.5"
            textAnchor="middle" className="mono">mean ${fmt(stats.mean,0)}B</text>
      {ticks.map(t=>(
        <g key={t}>
          <line x1={X(t)} x2={X(t)} y1={H-padB} y2={H-padB+4} stroke="var(--mute)"/>
          <text x={X(t)} y={H-padB+17} fill="var(--mute)" fontSize="11" textAnchor="middle"
                className="mono">${t}B</text>
        </g>
      ))}
      <text x={W/2} y={H-3} fill="var(--mute)" fontSize="11" textAnchor="middle">
        annual US AI token demand ($B, log scale)</text>
    </svg>
  );
}

// ---- horizontal share bars (segments / sobol) --------------------------
function Bars({rows, colorFn}){
  const max=Math.max(...rows.map(r=>r.value),1e-9);
  return rows.map((r,i)=>(
    <div className="bar-row" key={i}>
      <div className="lab">{r.label}</div>
      <div className="bar-track">
        <div className="bar-fill" style={{width:`${r.value/max*100}%`,background:colorFn(r,i)}}/>
      </div>
      <div className="pct mono">{(r.value*100).toFixed(0)}%</div>
    </div>
  ));
}

// ---- convergence indicator (signature element) -------------------------
function Convergence({skew}){
  // map skew to a regime; thresholds align with theory §7 (gamma ~ 0.5 frontier)
  let color, label, txt;
  if(skew < 0.25){ color="var(--accent)"; label="Near-Gaussian";
    txt="The market total sits in the Central-Limit regime: mean, variance and confidence intervals are reliable."; }
  else if(skew < 0.6){ color="#b07d2b"; label="Transitional";
    txt="Approaching Gaussian, but the upper tail is still heavy. Confidence intervals come from simulation, not the normal approximation."; }
  else { color="var(--warn)"; label="Heavy-tailed";
    txt="Enterprise concentration keeps the total skewed. A few large accounts dominate; tail risk is real and asymmetric."; }
  return (
    <div className="conv">
      <div className="dot" style={{background:color}}/>
      <div className="txt"><b style={{color}}>{label}</b> · skew {fmt(skew,2)}<br/>
        <span style={{color:"var(--mute)"}}>{txt}</span></div>
    </div>
  );
}

// ---- plain-language gloss for the three enterprise levers ---------------
const LEVER_HELP = [
  {term:"Enterprise AI adoption",
   def:"How much of a typical enterprise's IT budget flows to AI tokens: turn it up and more firms are spending more on AI."},
  {term:"Spend concentration",
   def:"How unevenly that AI spend is spread across firms: high means a handful of tokenmaxxing accounts drive most of the total (a heavy tail)."},
  {term:"Enterprise scale",
   def:"The size of the average enterprise's IT expenditure (both OpEx and CapEx): the spending base that AI adoption is applied to."},
];

function App(){
  const [data,setData]=useState(null);
  const [err,setErr]=useState(false);
  const [sel,setSel]=useState(null);
  const [showHelp,setShowHelp]=useState(false);

  useEffect(()=>{
    fetch("dashboard_data.json").then(r=>r.json()).then(d=>{
      setData(d);
      const a=Object.keys(d.levels.adoption.options);
      const c=Object.keys(d.levels.concentration.options);
      const s=Object.keys(d.levels.scale.options);
      setSel({adoption:a[Math.floor(a.length/2)],
              concentration:c[Math.floor(c.length/2)],
              scale:s[Math.floor(s.length/2)]});
    }).catch(()=>setErr(true));
  },[]);

  const scen = useMemo(()=>{
    if(!data||!sel) return null;
    return data.scenarios[`${sel.adoption}|${sel.concentration}|${sel.scale}`];
  },[data,sel]);

  if(err) return <div className="wrap"><div className="err">Couldn't load
    <span className="mono"> dashboard_data.json</span>. Make sure it sits beside this file.</div></div>;
  if(!data||!sel||!scen) return <div className="wrap"><div className="err">Loading model output…</div></div>;

  const Picker = ({dim})=>{
    const opts=Object.keys(data.levels[dim].options);
    return (
      <div className="ctrl">
        <label>{data.levels[dim].label}</label>
        <div className="seg" role="group">
          {opts.map(o=>(
            <button key={o} aria-pressed={sel[dim]===o}
              onClick={()=>setSel(s=>({...s,[dim]:o}))}>{o}</button>
          ))}
        </div>
      </div>
    );
  };

  const st=scen.stats;
  const segRows=[
    {label:"Consumer", value:scen.segments.consumer.varShare},
    {label:"Enterprise", value:scen.segments.enterprise.varShare},
  ];
  const segColor=r=> r.label==="Consumer"?"var(--consumer)":"var(--enterprise)";
  const sobolRows = scen.sobolTail.map(d=>({label:d.name.replace("_e","ₑ").replace("mu_I","μ·IT")
        .replace("sigma_I","σ·IT").replace("mu_K","μ·AI").replace("sigma_K","σ·AI"),
        value:d.ST}));
  const sobolColor=r=> r.label==="all others"?"var(--line)":"var(--enterprise)";

  return (
    <div className="wrap">
      <header>
        <p className="eyebrow">Digital AI demand · United States · equilibrium dollars</p>
        <h1>How big is the US market for <span className="em">AI tokens</span>?</h1>
        <p className="sub">A bottom-up estimate built on US personal income and enterprise firm-size distributions,
          together simulated to its Central-Limit shape. Sensitivity analysis revealed the three enterprise levers that
          drive ~95% of the uncertainty. Move them and watch the whole market respond.
          <span className="tag mono">Illustrative calibration using 2026 data</span></p>
      </header>

      <div className="controls-head">
        <span className="ttl">Three enterprise levers</span>
        <button className="help-btn" aria-expanded={showHelp}
          onClick={()=>setShowHelp(v=>!v)}>
          <span className="ic">?</span>
          {showHelp? "Hide explanations" : "What do these mean?"}
        </button>
      </div>

      {showHelp && (
        <div className="explain">
          {LEVER_HELP.map((h,i)=>(
            <div className="row" key={i}>
              <div className="term"><span className="sw"/>{h.term}</div>
              <div className="def">{h.def}</div>
            </div>
          ))}
        </div>
      )}

      <div className="controls">
        <Picker dim="adoption"/>
        <Picker dim="concentration"/>
        <Picker dim="scale"/>
      </div>

      <div className="grid">
        <div className="card">
          <h2>Total addressable market</h2>
          <p className="note">Distribution of annual US digital-AI spend across model runs.
            The gap between mean and median is the lognormal right-skew.</p>
          <DistChart hist={scen.hist} stats={st}/>
          <div className="statrow">
            <div className="stat"><div className="k">Mean</div>
              <div className="v mono">${fmt(st.mean,0)}<small>B</small></div></div>
            <div className="stat"><div className="k">Median</div>
              <div className="v mono">${fmt(st.median,0)}<small>B</small></div></div>
            <div className="stat"><div className="k">90% interval</div>
              <div className="v mono" style={{fontSize:"17px"}}>${fmt(st.p5,0)}–{fmt(st.p95,0)}<small>B</small></div></div>
            <div className="stat"><div className="k">Skew</div>
              <div className="v mono">{fmt(st.skew,2)}</div></div>
          </div>
        </div>

        <div className="card">
          <h2>Convergence regime</h2>
          <p className="note">Where this scenario sits relative to the Gaussian
            frontier (theory §7).</p>
          <Convergence skew={st.skew}/>
          <h2 style={{marginTop:22}}>Variance by segment</h2>
          <p className="note">Who drives the <i>uncertainty</i></p>
          <Bars rows={segRows} colorFn={segColor}/>
          <div className="legend">
            <span><i style={{background:"var(--consumer)"}}/>Consumer · ${fmt(scen.segments.consumer.mean,0)}B mean</span>
            <span><i style={{background:"var(--enterprise)"}}/>Enterprise · ${fmt(scen.segments.enterprise.mean,0)}B mean</span>
          </div>
        </div>

        <div className="card full">
          <h2>What drives the tail: P(TAM &gt; $100B)</h2>
          <p className="note">Total-order Sobol indices: the share of tail-risk uncertainty each
            input is responsible for. Four enterprise parameters carry almost all of it; the
            signal for where better data matters most.</p>
          <Bars rows={sobolRows} colorFn={sobolColor}/>
        </div>

        <div className="card full">
          <h2>Modeling assumptions</h2>
          <p className="note">What the numbers are conditional on. The first two
            is structural; the rest hold in the baseline and are relaxed in extensions.</p>
          <div className="assume">
            <div className="item key">
              <div className="nm">Token-price equilibrium<span className="pill">key</span></div>
              <div className="dx">TAM is measured in USD at <i>stable</i> token prices: price × token
                volume with price held fixed. It estimates the long-run equilibrium market, not
                today's: falling prices and demand elasticity (Jevons effects) are out of scope.
                The model is anchored to 2026 data/equilibrium window (~$40–60B), consistent with
                OpenAI + Anthropic alone run-rating to ~$35–40B of US demand and further providers
                (Google, Microsoft, AWS) on top.</div>
              <div className="nm">Digital AI only<span className="pill">key</span></div>
              <div className="dx">This model only considers Digital AI and not Physical AI such as robotics or software driven drones or vehicles.</div>
            </div>
            <div className="item">
              <div className="nm">Within-segment i.i.d. spend</div>
              <div className="dx">Every consumer and every enterprise draws its spend independently
                from the same segment-wide distribution.</div>
            </div>
            <div className="item">
              <div className="nm">Count–spend independence</div>
              <div className="dx">How many adopt is independent of how much each spends. Holds at full
                saturation; early-adopter selection bends it at partial penetration.</div>
            </div>
            <div className="item">
              <div className="nm">Cross-segment independence</div>
              <div className="dx">Consumer and enterprise totals move independently in the baseline, with no
                shared macro shock (added back via a covariance term in extensions).</div>
            </div>
            <div className="item">
              <div className="nm">Lognormal tails</div>
              <div className="dx">Firm size and spend are lognormal. The real upper tail may be heavier
                (Pareto), which would widen tail risk; flagged, not yet modeled.</div>
            </div>
          </div>
        </div>
      </div>

      <div className="glossary">
        <h2>Parameter glossary: μ and σ</h2>
        <div className="explain">
          <div className="row">
            <div className="term">μ (mu): level</div>
            <div className="def">The log of the <b>median</b>. It sets where the typical unit sits;
              raise μ and the whole distribution shifts up: a larger median income, firm size, or
              AI-spend share.</div>
          </div>
          <div className="row">
            <div className="term">σ (sigma): spread</div>
            <div className="def">The log-scale <b>dispersion</b>. It sets how unequal units are; raise σ
              and the right tail grows heavier: a few units pull far above the median, driving the
              concentration and tail risk that dominate the total.</div>
          </div>
          <div className="row">
            <div className="term">Subscripts</div>
            <div className="def"><b>IT</b> = income / firm-size scale (I); <b>AI</b> = AI-spend
              penetration, the share of that budget spent on tokens (K); <b>ₑ</b> = enterprise.
              Per-unit spend is X = K · I, so μ and σ add across the two.</div>
          </div>
        </div>
      </div>

      <footer>
        Model: dual-segment compound-lognormal TAM, two-level Monte Carlo (Wald + third-cumulant
        skewness), Saltelli/Jansen Sobol attribution. Figures are illustrative output from
        placeholder calibrations; shapes and relationships are the durable findings.
        Scenarios vary the three dominant enterprise levers; consumer inputs held at central values.
        <div className="links">
          <a href="https://github.com/sdbhide/token_TAM_US" target="_blank" rel="noopener noreferrer">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01
                1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
                0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18
